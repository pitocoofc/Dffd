name: Gerar APK Ndj-lib Reborn
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar e Construir
        run: |
          # 1. Instalação limpa
          npm install --ignore-scripts
          
          # 2. Criar pasta www se não existir (Capacitor exige isso)
          mkdir -p www
          if [ ! -f "www/index.html" ]; then
            echo "<html><body>Painel Red Magic Ativo</body></html>" > www/index.html
          fi
          
          # 3. Inicializar Capacitor e Adicionar Android (Forçado)
          npx cap init ndj-lib-reborn io.pitoco.ndj --web-dir www || true
          npx cap add android || true
          
          # 4. CONFIGURAR MANIFESTO (Garante que o caminho existe)
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          if [ -f "$MANIFEST" ]; then
            # Injeta as permissões de sobreposição e câmera
            sed -i '/<application/i \    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />' $MANIFEST
            sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
            sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />' $MANIFEST
            
            # MIUI Fix: Aplicar Tema Transparente
            sed -i 's/android:theme="@style\/AppTheme.NoActionBar"/android:theme="@style\/AppTheme.Transparent"/g' $MANIFEST
          fi

          # 5. Criar arquivo de Estilos Transparente
          STYLES_DIR="android/app/src/main/res/values"
          mkdir -p $STYLES_DIR
          echo '<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme.Transparent" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowIsTranslucent">true</item>
                  <item name="android:windowBackground">@android:color/transparent</item>
                  <item name="android:windowContentOverlay">@null</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:backgroundDimEnabled">false</item>
              </style>
          </resources>' > "$STYLES_DIR/styles.xml"

          # 6. Sincronizar e Compilar
          npx cap sync
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: ndj-reborn-apk
          path: android/app/build/outputs/apk/debug/*.apk
          
