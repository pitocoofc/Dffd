name: Gerar APK Ndj-lib Reborn
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar e Construir
        run: |
          # 1. Instala dependências (lerá o package.json sem comentários)
          npm install
          npm install @capacitor/assets --save-dev
          
          # 2. Adiciona plataforma Android se não existir
          npx cap add android || true
          
          # 3. GERAR ÍCONES (Se houver icon.png na raiz)
          if [ -f "icon.png" ]; then
            npx capacitor-assets generate --android
          fi

          # 4. CONFIGURAR PERMISSÕES NO MANIFEST
          npx cap update
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          # Inserindo permissões vitais para o painel estilo Red Magic
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WAKE_LOCK" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          
          # 5. Sincroniza arquivos da pasta www para o projeto Android
          npx cap sync
          
          # 6. Compilação do APK
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: ndj-reborn-apk
          path: android/app/build/outputs/apk/debug/*.apk
          
