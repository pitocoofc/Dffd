name: Gerar APK Ndj-lib Reborn
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar e Construir
        run: |
          # 1. Instala dependências
          npm install
          npm install @capacitor/assets --save-dev
          
          # 2. Adiciona plataforma Android
          npx cap add android || true
          
          # 3. GERAR ÍCONES (Se houver icon.png)
          if [ -f "icon.png" ]; then
            npx capacitor-assets generate --android
          fi

          # 4. ATUALIZAR E CONFIGURAR MANIFESTO
          npx cap update
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          # Injetar todas as permissões necessárias (incluindo sobreposição e câmera)
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.ACTION_MANAGE_OVERLAY_PERMISSION" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WAKE_LOCK" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST

          # Alterar o tema da Activity para Transparente no Manifest
          sed -i 's/android:theme="@style\/AppTheme.NoActionBar"/android:theme="@style\/AppTheme.Transparent"/g' $MANIFEST

          # 5. CRIAR ESTILO TRANSPARENTE (Styles.xml)
          # Isso garante que o fundo do app seja invisível
          STYLES_DIR="android/app/src/main/res/values"
          mkdir -p $STYLES_DIR
          echo '<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme.Transparent" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowIsTranslucent">true</item>
                  <item name="android:windowBackground">@android:color/transparent</item>
                  <item name="android:windowContentOverlay">@null</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:backgroundDimEnabled">false</item>
                  <item name="android:windowIsFloating">false</item>
              </style>
          </resources>' > "$STYLES_DIR/styles.xml"

          # 6. SINCRONIZAR E COMPILAR
          npx cap sync
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: ndj-reborn-apk
          path: android/app/build/outputs/apk/debug/*.apk
          
