<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modular Interpreter</title>
    <style>
        :root {
            --bg-color: #1e272e;
            --editor-bg: #2d3436;
            --cyan: #00d2d3;
            --red: #ff7675;
            --text: #ffffff;
            --console-bg: #111;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        #code-editor {
            flex: 1; background: var(--editor-bg); color: var(--text);
            border: none; padding: 15px; font-family: monospace;
            font-size: 16px; outline: none; resize: none; width: 100%; box-sizing: border-box;
        }

        #console-output {
            height: 150px; background: var(--console-bg);
            color: #2ecc71; padding: 10px; font-family: monospace;
            font-size: 14px; overflow-y: auto; border-top: 2px solid #333;
            white-space: pre-wrap;
        }

        #toolbar { background: var(--bg-color); padding: 10px; border-top: 1px solid #333; }

        .action-bar { display: flex; justify-content: space-between; }
        
        button {
            background: transparent; border: 1px solid var(--cyan); color: var(--cyan);
            padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer;
        }

        .btn-red { border-color: var(--red); color: var(--red); }
    </style>
</head>
<body>

    <textarea id="code-editor" spellcheck="false" placeholder='Infor("Olá Mundo")'></textarea>

    <div id="console-output">Console pronto...</div>

    <div id="toolbar">
        <div class="action-bar">
            <button onclick="executarCodigo()">EXECUTAR</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn-red" onclick="document.getElementById('code-editor').value = ''">LIMPAR</button>
                <button onclick="copiar()">COPIAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        const consoleOut = document.getElementById('console-output');

        window.executarCodigo = async () => {
            const code = document.getElementById('code-editor').value;
            const linhas = code.split('\n');
            consoleOut.innerHTML = "Iniciando processamento...\n";

            for (let linha of linhas) {
                linha = linha.trim();
                if (!linha) continue;

                // Regex para capturar: NomeDaFuncao e o Conteudo entre ()
                const match = linha.match(/^(\w+)\((.*)\)$/);

                if (match) {
                    const nomeArquivo = match[1]; // Ex: Infor
                    let conteudoRaw = match[2];  // Ex: "Olá Mundo" ou 123
                    
                    // Limpando aspas (remove " ou ' no início e fim)
                    const conteudoLimpo = conteudoRaw.replace(/^["']|["']$/g, '');

                    try {
                        // Tenta importar o arquivo JS da pasta functions
                        const modulePath = `./functions/${nomeArquivo}.js`;
                        const funcModule = await import(modulePath);

                        // Executa a lógica do arquivo passando o conteúdo limpo
                        if (funcModule.run) {
                            funcModule.run(conteudoLimpo);
                            consoleOut.innerHTML += `> Executado: ${nomeArquivo}\n`;
                        }
                    } catch (e) {
                        consoleOut.innerHTML += `<span style="color:var(--red)">Erro: Função '${nomeArquivo}' não encontrada ou erro no arquivo.</span>\n`;
                    }
                }
            }
        };

        window.copiar = () => {
            navigator.clipboard.writeText(document.getElementById('code-editor').value);
            alert("Copiado!");
        };
    </script>
</body>
</html>
