<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Red Magic Overlay Reborn</title>
    <script src="capacitor.js"></script>
    <style>
        :root {
            --main-color: #ffd700;
            --main-glow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            background: transparent !important;
            font-family: 'Consolas', monospace;
            -webkit-user-select: none;
            user-select: none;
            display: flex; align-items: center; justify-content: center;
        }

        /* Botão de Ativação (Estilo Reator) */
        #activator-btn {
            width: 130px; height: 130px;
            background: rgba(0,0,0,0.9);
            border: 4px solid var(--main-color);
            border-radius: 50%;
            color: var(--main-color);
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 0 25px var(--main-glow);
            z-index: 20000;
            transition: 0.3s;
        }

        #activator-btn:active { transform: scale(0.9); box-shadow: 0 0 40px var(--main-color); }

        /* Container Lateral (Inicia Escondido) */
        #gamer-overlay-container {
            display: none; /* Ativado via JS */
            position: fixed; top: 50%; right: 0;
            transform: translateY(-50%);
            width: 70px; padding: 15px 5px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-left: 3px solid var(--main-color);
            border-radius: 20px 0 0 20px;
            flex-direction: column; align-items: center; gap: 20px;
            z-index: 10000;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .overlay-btn {
            width: 50px; height: 50px;
            background: rgba(30, 30, 30, 0.6);
            border: 1px solid #444; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: var(--main-color); cursor: pointer;
            position: relative;
        }

        .btn-text {
            position: absolute; bottom: -18px; font-size: 8px;
            text-transform: uppercase; color: #aaa; width: 60px; text-align: center;
        }

        #fps-display {
            display: none; position: fixed; bottom: 20px; left: 20px;
            padding: 8px 12px; background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--main-color); border-radius: 8px;
            color: var(--main-color); font-weight: bold; z-index: 10001;
        }

        #overlay-dialog {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 220px;
            padding: 20px; background: #111; border: 2px solid #333;
            border-radius: 15px; color: #eee; z-index: 10002; text-align: center;
        }

        input { width: 80%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
        button { padding: 8px 15px; background: var(--main-color); border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

    </style>
</head>
<body>

    <div id="activator-btn">INICIAR<br>BOOST</div>

    <div id="fps-display">FPS: <span id="fps-value">0</span></div>

    <div id="gamer-overlay-container">
        <div class="overlay-btn" id="toggle-fps">
            <span style="font-size: 18px;">📊</span>
            <span class="btn-text">FPS</span>
        </div>
        <div class="overlay-btn" id="change-img">
            <span style="font-size: 18px;">📷</span>
            <span class="btn-text">Imagem</span>
        </div>
        <div class="overlay-btn" id="lock-fps">
            <span style="font-size: 18px;">🔒</span>
            <span class="btn-text">Travar</span>
        </div>
        <div class="overlay-btn" id="change-color">
            <span style="font-size: 18px;">🔥</span>
            <span class="btn-text">Cor</span>
        </div>
    </div>

    <div id="overlay-dialog">
        <h3>Travar FPS</h3>
        <input type="number" id="fps-input" placeholder="Ex: 30">
        <button id="apply-lock">APLICAR</button>
        <button id="close-lock" style="background:#444; color:#fff; margin-top:5px">X</button>
    </div>

    <script>
        // Verificação robusta de plugins
        const getPlugins = () => {
            if (window.Capacitor && window.Capacitor.Plugins) {
                return window.Capacitor.Plugins;
            }
            return null;
        };

        let targetFPS = 60;
        let isRed = false;
        let lastFrameTime = 0;
        let lastFpsUpdate = 0;

        // --- ATIVAÇÃO DO PAINEL ---
        document.getElementById('activator-btn').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('gamer-overlay-container').style.display = 'flex';
            
            // Alerta preventivo para MIUI
            setTimeout(() => {
                alert("MIUI Detectada: Se o painel sumir, ative 'Exibir janelas pop-up' nas config do app.");
            }, 500);
            
            requestAnimationFrame(loop);
        });

        // --- LÓGICA DE FPS ---
        function loop(currentTime) {
            const deltaTime = currentTime - lastFrameTime;
            const interval = 1000 / targetFPS;

            if (deltaTime >= interval) {
                if (currentTime > lastFpsUpdate + 500) {
                    const actualFPS = Math.round(1000 / deltaTime);
                    // Garante que o mostrador não ultrapasse o teto de forma bizarra
                    document.getElementById('fps-value').innerText = actualFPS > targetFPS + 5 ? targetFPS : actualFPS;
                    lastFpsUpdate = currentTime;
                }
                lastFrameTime = currentTime - (deltaTime % interval);
            }
            requestAnimationFrame(loop);
        }

        // --- MUDAR IMAGEM ---
        document.getElementById('change-img').addEventListener('click', async () => {
            const plugins = getPlugins();
            if (!plugins || !plugins.Camera) {
                alert("Erro: Plugin Camera não carregado.");
                return;
            }
            try {
                const image = await plugins.Camera.getPhoto({
                    quality: 90,
                    allowEditing: false,
                    resultType: 'uri', // Simplificado para 'uri'
                    source: 'PHOTOS'
                });
                document.body.style.backgroundImage = `url(${image.webPath})`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
            } catch (err) { console.log("User cancelled"); }
        });

        // --- OUTRAS FUNÇÕES ---
        document.getElementById('toggle-fps').addEventListener('click', () => {
            const el = document.getElementById('fps-display');
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        });

        document.getElementById('lock-fps').addEventListener('click', () => {
            document.getElementById('overlay-dialog').style.display = 'block';
        });

        document.getElementById('apply-lock').addEventListener('click', () => {
            const val = parseInt(document.getElementById('fps-input').value);
            if (val >= 10 && val <= 120) {
                targetFPS = val;
                document.getElementById('overlay-dialog').style.display = 'none';
                const p = getPlugins();
                if (p && p.Haptics) p.Haptics.vibrate();
            }
        });

        document.getElementById('close-lock').addEventListener('click', () => {
            document.getElementById('overlay-dialog').style.display = 'none';
        });

        document.getElementById('change-color').addEventListener('click', () => {
            isRed = !isRed;
            document.documentElement.style.setProperty('--main-color', isRed ? '#ff0000' : '#ffd700');
            const p = getPlugins();
            if (p && p.Haptics) p.Haptics.impact({ style: 'LIGHT' });
        });
    </script>
</body>
</html>
